name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://switchboard:switchboard@localhost:5432/switchboard
      CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CI_CREDENTIALS_ENCRYPTION_KEY || 'ci-test-encryption-secret-32chr' }}
      NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-nextauth-secret' }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install .agent/tools dependencies
        run: cd .agent/tools && pnpm install --ignore-workspace --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @switchboard/db exec prisma generate

      - name: Check Prisma schema drift
        run: pnpm db:check-drift

      - name: Run database migrations
        run: pnpm --filter @switchboard/db exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Seed development data
        run: pnpm db:seed

      - name: Verify seed counts
        run: pnpm exec tsx scripts/check-seed-counts.ts

      - name: Cache build artifacts
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            pnpm-lock.yaml
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            evals/*/node_modules
            packages/db/node_modules/.prisma
            .agent/tools/node_modules
          key: build-${{ github.sha }}

  typecheck:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            pnpm-lock.yaml
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            evals/*/node_modules
            packages/db/node_modules/.prisma
            .agent/tools/node_modules
          key: build-${{ github.sha }}

      - name: Typecheck
        run: pnpm typecheck

  lint:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            pnpm-lock.yaml
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            evals/*/node_modules
            packages/db/node_modules/.prisma
            .agent/tools/node_modules
          key: build-${{ github.sha }}

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Local readiness pre-flight (fast)
        run: pnpm local:verify:fast

  test:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            pnpm-lock.yaml
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            evals/*/node_modules
            packages/db/node_modules/.prisma
            .agent/tools/node_modules
          key: build-${{ github.sha }}

      - name: Test with coverage
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage report on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json

      - name: Check for untested packages
        run: bash scripts/check-no-empty-tests.sh

      # apps/dashboard has its own vitest runner (jsdom + .test.tsx) and coverage
      # gate (40/35/40/40), excluded from the root config above — so its 300+ test
      # files never ran in CI until this step. Without it a dashboard test can rot
      # red and still merge green.
      - name: Dashboard tests with coverage
        run: pnpm --filter @switchboard/dashboard exec vitest run --coverage

      - name: Dashboard production build
        env:
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CI_CREDENTIALS_ENCRYPTION_KEY || 'ci-test-encryption-secret-32chr' }}
          NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-nextauth-secret' }}
        run: pnpm --filter @switchboard/dashboard build

  # Real-Postgres integration tier (INFRA-2 / EV-16). The DATABASE_URL-gated
  # suites in packages/db (describe.skipIf(!process.env.DATABASE_URL)) prove
  # invariants that mocked Prisma cannot — referential integrity, transaction
  # rollback atomicity, real read paths — so they no-op in every unit lane and
  # run only here, against a real Postgres. This job is additive and isolated:
  # the unit lanes (test/typecheck/lint) stay Postgres-free. GH Actions service
  # containers are per-job and torn down at job end, so this declares its OWN
  # postgres (the setup job's is not reusable). It reuses the existing
  # DATABASE_URL skip-gate — no INTEGRATION_DB_URL — and runs the suites as a
  # standalone `vitest --config` invocation (vitest.integration.config.ts).
  integration-postgres:
    name: Integration — Real Postgres
    needs: setup
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://switchboard:switchboard@localhost:5432/switchboard
      CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CI_CREDENTIALS_ENCRYPTION_KEY || 'ci-test-encryption-secret-32chr' }}
      NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-nextauth-secret' }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            pnpm-lock.yaml
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            evals/*/node_modules
            packages/db/node_modules/.prisma
            .agent/tools/node_modules
          key: build-${{ github.sha }}

      # Insurance against the silent-skip failure mode: if DATABASE_URL were ever
      # dropped from this job's env, the skipIf gate would skip every integration
      # test and the job would pass green having proven nothing. Fail fast instead.
      - name: Confirm DATABASE_URL is set
        run: test -n "$DATABASE_URL"

      - name: Run database migrations
        run: pnpm --filter @switchboard/db exec prisma migrate deploy

      - name: Seed development data
        run: pnpm db:seed

      - name: Real-Postgres integration suites
        run: pnpm exec vitest run --config vitest.integration.config.ts

  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            pnpm-lock.yaml
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            evals/*/node_modules
            packages/db/node_modules/.prisma
            .agent/tools/node_modules
          key: build-${{ github.sha }}

      - name: Regenerate lockfile with overrides
        run: pnpm install --no-frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

  architecture:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # Route-class advisory below runs `git diff origin/main...HEAD` to
          # detect touched routes. The default shallow clone has no
          # remote-tracking branches, so the diff fails silently and the
          # advisory emits zero warnings on every PR. Full history fixes it.
          # See PR #614 ultrareview bug_001.
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            pnpm-lock.yaml
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            evals/*/node_modules
            packages/db/node_modules/.prisma
            .agent/tools/node_modules
          key: build-${{ github.sha }}

      - name: Architecture health check
        run: pnpm dlx tsx scripts/arch-check.ts

      - name: Dependency boundary validation
        run: npx depcruise --config .dependency-cruiser.cjs packages/ cartridges/ apps/

      - name: Route governance enforcement (Route Governance Contract v1)
        run: pnpm exec tsx .agent/tools/check-routes.ts --mode=error

      # The route/store/cross-app validators above enforce governance invariants
      # (single-ingress, tenant-isolation, idempotency), but the root vitest
      # config excludes .agent/** — so their own unit tests never ran in CI and a
      # regression that silently turned a validator into a no-op would merge
      # green. Run the validators' self-tests here, where the setup job already
      # cached .agent/tools/node_modules.
      - name: Validator self-tests (.agent/tools)
        run: cd .agent/tools && pnpm test

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Verify Docker build (API)
        run: docker build --target api -t switchboard-api:ci .

      - name: Verify Docker build (Chat)
        run: docker build --target chat -t switchboard-chat:ci .

      - name: Verify Docker build (Dashboard)
        run: docker build --target dashboard -t switchboard-dashboard:ci .

  eval-classifier:
    name: Eval — Claim Classifier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Filter classifier-relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Empty token forces a local `git diff` against the base instead of the
          # GitHub REST API (the default token's API access returns 401 in CI here).
          token: ""
          # Scope = exactly what the eval exercises. It invokes the classifier
          # unit directly (createAnthropicClaimClassifier), so its only inputs are
          # the classifier source + the claim-classifier schema below. The
          # skill-runtime hook that wires the classifier into production is a
          # consumer the eval bypasses, so it is intentionally NOT a trigger here
          # (a change there can't shift this eval's results).
          filters: |
            classifier:
              - '.github/workflows/ci.yml'
              - 'packages/core/src/governance/classifier/**'
              - 'packages/schemas/src/claim-classifier.ts'
              - 'evals/claim-classifier/**'

      - name: Skip notice (no classifier-relevant changes)
        if: steps.filter.outputs.classifier != 'true' && github.ref != 'refs/heads/main'
        run: 'echo "Eval — Claim Classifier skipped: no classifier-relevant paths changed."'

      - uses: pnpm/action-setup@v5
        if: steps.filter.outputs.classifier == 'true' || github.ref == 'refs/heads/main'

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.classifier == 'true' || github.ref == 'refs/heads/main'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.classifier == 'true' || github.ref == 'refs/heads/main'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages required by the harness
        if: steps.filter.outputs.classifier == 'true' || github.ref == 'refs/heads/main'
        # The shared evals/vitest.config.ts runs ALL eval suites' unit tests — incl.
        # riley-recommendation (imports @switchboard/ad-optimizer) and alex-conversation
        # (imports @switchboard/db) from dist — so every job running that config must
        # build both (each depends only on already-built @switchboard/schemas/core).
        run: pnpm --filter @switchboard/core^... build && pnpm --filter @switchboard/core build && pnpm --filter @switchboard/ad-optimizer build && pnpm --filter @switchboard/db build

      - name: Run eval unit tests
        if: steps.filter.outputs.classifier == 'true' || github.ref == 'refs/heads/main'
        run: pnpm exec vitest run --config evals/vitest.config.ts

      - name: Run claim-classifier eval
        if: steps.filter.outputs.classifier == 'true' || github.ref == 'refs/heads/main'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm eval:classifier

  eval-alex-conversation:
    name: Eval — Alex Conversation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Filter alex-conversation-relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Empty token forces a local `git diff` against the base instead of the
          # GitHub REST API (the default token's API access returns 401 in CI here).
          token: ""
          filters: |
            alex:
              - '.github/workflows/ci.yml'
              - 'skills/alex/**'
              - 'evals/alex-conversation/**'
              - 'evals/claim-boundary/**'
              - 'packages/core/src/skill-runtime/**'

      - name: Skip notice (no alex-conversation-relevant changes)
        if: steps.filter.outputs.alex != 'true' && github.ref != 'refs/heads/main'
        run: 'echo "Eval — Alex Conversation skipped: no alex-conversation-relevant paths changed."'

      - uses: pnpm/action-setup@v5
        if: steps.filter.outputs.alex == 'true' || github.ref == 'refs/heads/main'

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.alex == 'true' || github.ref == 'refs/heads/main'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.alex == 'true' || github.ref == 'refs/heads/main'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages required by the harness
        if: steps.filter.outputs.alex == 'true' || github.ref == 'refs/heads/main'
        # The shared evals/vitest.config.ts now also runs the riley-recommendation
        # suite, which imports @switchboard/ad-optimizer from dist — so every job
        # that runs that config must build ad-optimizer too (it depends only on
        # @switchboard/schemas, already built by the core chain above).
        # The eval now also imports @switchboard/db (real PrismaBusinessFactsStore
        # over a mock prisma) from dist, so build db too — its `build` runs
        # `prisma generate` (no Postgres needed) + tsc.
        run: pnpm --filter @switchboard/core^... build && pnpm --filter @switchboard/core build && pnpm --filter @switchboard/ad-optimizer build && pnpm --filter @switchboard/db build

      - name: Run eval unit tests
        if: steps.filter.outputs.alex == 'true' || github.ref == 'refs/heads/main'
        run: pnpm exec vitest run --config evals/vitest.config.ts

      - name: Run alex-conversation eval
        # Informational (live-LLM scored) — deliberately non-blocking until BOTH:
        # (1) the baseline bakes (≥14 days on main, baseline.json committed, zero
        # false-positives observed), and (2) live-eval credits are restored
        # (ANTHROPIC_API_KEY, #672). NOTE: the deterministic oracle/fixture checks
        # in the "Run eval unit tests" step above ARE blocking — only the live
        # conversation scoring is informational here. Flip to false once both hold.
        continue-on-error: true
        if: steps.filter.outputs.alex == 'true' || github.ref == 'refs/heads/main'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm eval:alex-conversation

  eval-adversarial-injection:
    name: Eval — Adversarial Injection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Filter adversarial-injection-relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Empty token forces a local `git diff` against the base instead of the
          # GitHub REST API (the default token's API access returns 401 in CI here).
          token: ""
          filters: |
            adversarial:
              - '.github/workflows/ci.yml'
              - 'skills/alex/**'
              - 'evals/adversarial-injection/**'
              - 'evals/alex-conversation/**'
              - 'packages/core/src/skill-runtime/**'

      - name: Skip notice (no adversarial-injection-relevant changes)
        if: steps.filter.outputs.adversarial != 'true' && github.ref != 'refs/heads/main'
        run: 'echo "Eval — Adversarial Injection skipped: no adversarial-injection-relevant paths changed."'

      - uses: pnpm/action-setup@v5
        if: steps.filter.outputs.adversarial == 'true' || github.ref == 'refs/heads/main'

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.adversarial == 'true' || github.ref == 'refs/heads/main'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.adversarial == 'true' || github.ref == 'refs/heads/main'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages required by the harness
        if: steps.filter.outputs.adversarial == 'true' || github.ref == 'refs/heads/main'
        # The adversarial-injection eval reuses the alex-conversation harness (the
        # real Alex skill-runtime over @switchboard/core + @switchboard/db), and the
        # shared evals/vitest.config.ts runs every eval suite's unit tests (incl.
        # riley-recommendation → @switchboard/ad-optimizer) — so build the same chain
        # the alex job builds.
        run: pnpm --filter @switchboard/core^... build && pnpm --filter @switchboard/core build && pnpm --filter @switchboard/ad-optimizer build && pnpm --filter @switchboard/db build

      - name: Run eval unit tests
        if: steps.filter.outputs.adversarial == 'true' || github.ref == 'refs/heads/main'
        run: pnpm exec vitest run --config evals/vitest.config.ts

      - name: Run adversarial-injection eval
        # Informational (live-LLM scored) — non-blocking until ANTHROPIC_API_KEY is
        # restored (INFRA-1) and the baseline bakes. The deterministic grader + the
        # offline seam teeth in "Run eval unit tests" above ARE blocking; only the
        # live conversation drive + judge is informational here. NOTE: a deterministic
        # violation on a LIVE run still fails this step (a real vulnerability), even
        # while the step is non-blocking overall.
        continue-on-error: true
        if: steps.filter.outputs.adversarial == 'true' || github.ref == 'refs/heads/main'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm eval:adversarial-injection

  eval-claim-boundary:
    name: Eval — Claim Boundary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Filter claim-boundary-relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Empty token forces a local `git diff` against the base instead of the
          # GitHub REST API (the default token's API access returns 401 in CI here).
          token: ""
          filters: |
            claim:
              - '.github/workflows/ci.yml'
              - 'skills/alex/**'
              - 'evals/claim-boundary/**'
              - 'evals/alex-conversation/**'
              - 'packages/core/src/skill-runtime/**'

      - name: Skip notice (no claim-boundary-relevant changes)
        if: steps.filter.outputs.claim != 'true' && github.ref != 'refs/heads/main'
        run: 'echo "Eval — Claim Boundary skipped: no claim-boundary-relevant paths changed."'

      - uses: pnpm/action-setup@v5
        if: steps.filter.outputs.claim == 'true' || github.ref == 'refs/heads/main'

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.claim == 'true' || github.ref == 'refs/heads/main'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.claim == 'true' || github.ref == 'refs/heads/main'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages required by the harness
        if: steps.filter.outputs.claim == 'true' || github.ref == 'refs/heads/main'
        # The claim-boundary eval reuses the alex-conversation harness (the real Alex
        # skill-runtime over @switchboard/core + @switchboard/db) and the real
        # ClaimClassifierHook, and the shared evals/vitest.config.ts runs every eval
        # suite's unit tests (incl. riley-recommendation → @switchboard/ad-optimizer)
        # — so build the same chain the alex job builds.
        run: pnpm --filter @switchboard/core^... build && pnpm --filter @switchboard/core build && pnpm --filter @switchboard/ad-optimizer build && pnpm --filter @switchboard/db build

      - name: Run eval unit tests
        if: steps.filter.outputs.claim == 'true' || github.ref == 'refs/heads/main'
        run: pnpm exec vitest run --config evals/vitest.config.ts

      - name: Run claim-boundary eval
        # Informational (live-LLM scored) — non-blocking until ANTHROPIC_API_KEY is
        # restored (INFRA-1). The deterministic grader + the offline two-mode teeth in
        # "Run eval unit tests" above ARE blocking; only the live Alex drive + the live
        # enforce-gate drive are informational here. NOTE: a deterministic violation on a
        # LIVE run still fails this step (a real claim-boundary finding), even while the
        # step is non-blocking overall.
        continue-on-error: true
        if: steps.filter.outputs.claim == 'true' || github.ref == 'refs/heads/main'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm eval:claim-boundary

  eval-mira-self-brief:
    name: Eval — Mira Self-Brief
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Filter mira-self-brief-relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Empty token forces a local `git diff` against the base instead of the
          # GitHub REST API (the default token's API access returns 401 in CI here).
          token: ""
          filters: |
            mira:
              - '.github/workflows/ci.yml'
              - 'skills/mira/**'
              - 'evals/mira-self-brief/**'
              - 'evals/alex-conversation/**'
              - 'packages/core/src/skill-runtime/**'
              - 'packages/schemas/src/mira-compose.ts'

      - name: Skip notice (no mira-self-brief-relevant changes)
        if: steps.filter.outputs.mira != 'true' && github.ref != 'refs/heads/main'
        run: 'echo "Eval — Mira Self-Brief skipped: no mira-self-brief-relevant paths changed."'

      - uses: pnpm/action-setup@v5
        if: steps.filter.outputs.mira == 'true' || github.ref == 'refs/heads/main'

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.mira == 'true' || github.ref == 'refs/heads/main'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.mira == 'true' || github.ref == 'refs/heads/main'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages required by the harness
        if: steps.filter.outputs.mira == 'true' || github.ref == 'refs/heads/main'
        # The mira-self-brief eval drives the real skill-runtime (@switchboard/core)
        # over @switchboard/schemas (parseMiraComposeOutput) and reuses the
        # alex-conversation temp-0 adapter; the shared evals/vitest.config.ts also runs
        # every other eval suite's unit tests (incl. riley-recommendation →
        # @switchboard/ad-optimizer) — so build the same chain the alex job builds.
        run: pnpm --filter @switchboard/core^... build && pnpm --filter @switchboard/core build && pnpm --filter @switchboard/ad-optimizer build && pnpm --filter @switchboard/db build

      - name: Run eval unit tests
        if: steps.filter.outputs.mira == 'true' || github.ref == 'refs/heads/main'
        run: pnpm exec vitest run --config evals/vitest.config.ts

      - name: Run mira-self-brief eval
        # Informational (live-LLM scored) — non-blocking until ANTHROPIC_API_KEY is
        # restored (INFRA-1) and the baseline bakes. The deterministic grader + the
