name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://switchboard:switchboard@localhost:5432/switchboard
      API_KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chr
      NEXTAUTH_SECRET: ci-test-nextauth-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @switchboard/db exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @switchboard/db exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://switchboard:switchboard@localhost:5432/switchboard
      API_KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chr
      NEXTAUTH_SECRET: ci-test-nextauth-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @switchboard/db exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @switchboard/db exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://switchboard:switchboard@localhost:5432/switchboard
      API_KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chr
      NEXTAUTH_SECRET: ci-test-nextauth-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @switchboard/db exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @switchboard/db exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker build (API)
        run: docker build --target api -t switchboard-api:ci .

      - name: Verify Docker build (Chat)
        run: docker build --target chat -t switchboard-chat:ci .

      - name: Verify Docker build (Dashboard)
        run: docker build --target dashboard -t switchboard-dashboard:ci .
