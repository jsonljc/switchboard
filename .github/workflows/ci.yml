  eval-resolver:
    name: Eval — Resolver Routing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Filter resolver-relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Empty token forces a local `git diff` against the base instead of the
          # GitHub REST API (the default token's API access returns 401 in CI here).
          token: ""
          # The blocking leg is a DRIFT GUARD: it pins the dataset's expected targets to
          # what RESOLVER.md documents (its .agent/skills/<slug>/SKILL.md load paths). It
          # does NOT simulate routing (there is no programmatic resolver). So re-run when
          # the dataset, the resolver doc, the harness, or the shared eval config changes.
          filters: |
            resolver:
              - '.github/workflows/ci.yml'
              - 'evals/resolver/**'
              - 'evals/vitest.config.ts'
              - '.agent/evals/**'
              - '.agent/RESOLVER.md'

      - name: Skip notice (no resolver-relevant changes)
        if: steps.filter.outputs.resolver != 'true' && github.ref != 'refs/heads/main'
        run: 'echo "Eval — Resolver Routing skipped: no resolver-relevant paths changed."'

      - uses: pnpm/action-setup@v5
        if: steps.filter.outputs.resolver == 'true' || github.ref == 'refs/heads/main'

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.resolver == 'true' || github.ref == 'refs/heads/main'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.filter.outputs.resolver == 'true' || github.ref == 'refs/heads/main'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages required by the harness
        if: steps.filter.outputs.resolver == 'true' || github.ref == 'refs/heads/main'
        # The resolver harness itself needs NO workspace package, but the shared
        # evals/vitest.config.ts runs ALL eval suites' unit tests — incl.
        # riley-recommendation (imports @switchboard/ad-optimizer) and alex-conversation
        # (imports @switchboard/db) from dist — so every job running that config must
        # build the same chain.
        run: pnpm --filter @switchboard/core^... build && pnpm --filter @switchboard/core build && pnpm --filter @switchboard/ad-optimizer build && pnpm --filter @switchboard/db build

      - name: Run eval unit tests
        if: steps.filter.outputs.resolver == 'true' || github.ref == 'refs/heads/main'
        run: pnpm exec vitest run --config evals/vitest.config.ts

      # The deterministic DRIFT-GUARD leg is BLOCKING (no key, no network): it fails on
      # any dataset/RESOLVER.md target drift. The key-gated live routing-accuracy leg is
      # INFORMATIONAL — it soft-skips without ANTHROPIC_API_KEY and never exits nonzero —
      # so this step reddens only on real drift. Non-required, like the other eval jobs.
      - name: Run resolver eval
        if: steps.filter.outputs.resolver == 'true' || github.ref == 'refs/heads/main'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm eval:resolver
