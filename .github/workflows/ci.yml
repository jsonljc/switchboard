name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: switchboard
          POSTGRES_PASSWORD: switchboard
          POSTGRES_DB: switchboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U switchboard"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://switchboard:switchboard@localhost:5432/switchboard
      API_KEY_ENCRYPTION_SECRET: ci-test-encryption-secret-32chr
      NEXTAUTH_SECRET: ci-test-nextauth-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @switchboard/db exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @switchboard/db exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            packages/db/node_modules/.prisma
          key: build-${{ github.sha }}

  typecheck:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            packages/db/node_modules/.prisma
          key: build-${{ github.sha }}

      - name: Typecheck
        run: pnpm typecheck

  lint:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            packages/db/node_modules/.prisma
          key: build-${{ github.sha }}

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  test:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            packages/db/node_modules/.prisma
          key: build-${{ github.sha }}

      - name: Test with coverage
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage report on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json

      - name: Check for untested packages
        run: bash scripts/check-no-empty-tests.sh

  secrets:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            packages/db/node_modules/.prisma
          key: build-${{ github.sha }}

      - name: Security audit
        run: pnpm audit --audit-level=critical

  architecture:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/node_modules
            cartridges/*/dist
            cartridges/*/node_modules
            apps/*/dist
            apps/*/.next
            apps/*/node_modules
            packages/db/node_modules/.prisma
          key: build-${{ github.sha }}

      - name: Architecture health check
        run: pnpm dlx tsx scripts/arch-check.ts

      - name: Dependency boundary validation
        run: npx depcruise --config .dependency-cruiser.cjs packages/ cartridges/ apps/

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker build (API)
        run: docker build --target api -t switchboard-api:ci .

      - name: Verify Docker build (Chat)
        run: docker build --target chat -t switchboard-chat:ci .

      - name: Verify Docker build (Dashboard)
        run: docker build --target dashboard -t switchboard-dashboard:ci .

      - name: Verify Docker build (MCP Server)
        run: docker build --target mcp-server -t switchboard-mcp-server:ci .
