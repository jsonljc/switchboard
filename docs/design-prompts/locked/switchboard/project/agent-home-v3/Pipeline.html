<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pipeline · Switchboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: hsl(45 25% 98%); color: #0E0C0A; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { width: 100vw; min-height: 100vh; }
  *[data-tabular] { font-variant-numeric: tabular-nums; }
  input::placeholder { color: #A39786; }
  /* Hide native scrollbars on the board horizontal scroller */
  .pl-board::-webkit-scrollbar { height: 10px; }
  .pl-board::-webkit-scrollbar-thumb { background: rgba(14,12,10,0.15); border-radius: 999px; }
  .pl-board::-webkit-scrollbar-track { background: transparent; }
  /* Column inner scroll */
  .pl-col-body::-webkit-scrollbar { width: 6px; }
  .pl-col-body::-webkit-scrollbar-thumb { background: rgba(14,12,10,0.10); border-radius: 999px; }
  /* DnD cues */
  .pl-card[data-dragging="true"] { opacity: 0.35; }
  .pl-col[data-over="true"] .pl-col-body { background: rgba(184, 120, 46, 0.06); }
  .pl-col[data-over="true"] { box-shadow: inset 0 0 0 1px rgba(184, 120, 46, 0.45); }
  @keyframes pl-fadein { from { opacity: 0; transform: translateY(2px);} to { opacity: 1; transform: none; } }
  .pl-toast { animation: pl-fadein .2s ease; }
  @keyframes pl-savedots { 0%, 80%, 100% { opacity: .25 } 40% { opacity: 1 } }
  .pl-savedot { display: inline-block; width: 3px; height: 3px; border-radius: 50%; background: currentColor; margin: 0 1px; animation: pl-savedots 1.2s infinite ease-in-out; }
  .pl-savedot:nth-child(2) { animation-delay: .15s; }
  .pl-savedot:nth-child(3) { animation-delay: .3s; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="pipeline-data.jsx"></script>
<script type="text/babel" src="pipeline.jsx"></script>
</body>
</html>
