# Render Infrastructure-as-Code for Switchboard pilot launch.
# Reference: docs/superpowers/specs/2026-05-15-deployment-hosting-design.md
#
# Blueprint v2 schema verified against https://render.com/docs/blueprint-spec
# on 2026-05-15. Notable deltas from earlier drafts:
#   - Redis uses `type: keyvalue` (the legacy `type: redis` is deprecated).
#   - There is no multi-stage Dockerfile `--target` field in the Blueprint
#     schema, so each web service points at a per-service Dockerfile
#     (`Dockerfile.api`, `Dockerfile.chat`) instead of the root multi-stage
#     `Dockerfile`. The root Dockerfile is retained for local integration
#     testing via docker-compose.prod.yml.
#   - The deprecated `autoDeploy: true` is replaced by
#     `autoDeployTrigger: commit`.
#   - `buildFilter` uses `paths` (a flat list of glob patterns) under
#     `include` / `exclude` (current schema field names).
#   - `fromService` references the Key Value service with `type: keyvalue`.
#
# Values for envVars with `sync: false` are entered in the Render UI from
# the master vault. This file declares only their *keys*.
#
# Region: `oregon` (chosen 2026-05-15). Defensible US default — Render's most
# established region with full service-type parity (Web Service, Postgres,
# KeyValue). Acceptable Meta-webhook latency at pilot scale. Document the
# choice and rationale in `docs/runbooks/production-urls.md` per spec §3.

services:
  - type: web
    name: switchboard-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: starter
    region: oregon
    numInstances: 1
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /health # Shallow liveness — Render uses this to gate container promotion.
    preDeployCommand: pnpm --filter @switchboard/db run migrate:deploy
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - Dockerfile.api
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - package.json
        - turbo.json
        - tsconfig.base.json
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: switchboard-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: switchboard-redis
          property: connectionString
      - key: CREDENTIALS_ENCRYPTION_KEY
        sync: false
      # Shared chat<->api service secret. MUST be the SAME value on both services.
      # Authenticates the chat-to-API ingress hop (F-15) + provision-notify + chat-approvals.
      - key: INTERNAL_API_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      # Meta WhatsApp/Ads via the Tech Provider model: system-user token, app
      # secret (webhook-signature verification), and webhook verify token.
      # Supersedes the removed per-account META_ADS_ACCESS_TOKEN/META_ADS_ACCOUNT_ID.
      - key: META_SYSTEM_USER_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      # App-scoped WhatsApp Graph token for provisioning/health checks. Distinct
      # from META_SYSTEM_USER_TOKEN (the Tech-Provider token for client WABAs).
      - key: WHATSAPP_GRAPH_TOKEN
        sync: false
      # WhatsApp Cloud API send token for the api service's PROACTIVE outbound
      # workflows (appointment reminders, lead greetings, follow-ups) and the
      # escalation-reply agentNotifier in app.ts. Without it the api service has no
      # send token and a structured warn + the switchboard_whatsapp_proactive_send_skipped_total
      # metric (reason="config_missing") fire as every proactive WhatsApp message
      # no-ops org-wide. WHATSAPP_ACCESS_TOKEN is the canonical key; resolveWhatsAppSendToken()
      # reads it first and falls back to the WHATSAPP_TOKEN alias, so setting either
      # one covers all api send paths. WHATSAPP_PHONE_NUMBER_ID is required alongside it.
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      # Backward-compatible alias for WHATSAPP_ACCESS_TOKEN; leave unset if the
      # canonical key above is set.
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      # Used by WhatsApp channel webhook auto-registration during provisioning
      # (organizations.ts), alongside WHATSAPP_GRAPH_TOKEN. Absent => channel
      # provisioning reports "config_error_meta: missing WHATSAPP_APP_SECRET".
      # Distinct from META_APP_SECRET (Meta OAuth / ad-webhook signature).
      - key: WHATSAPP_APP_SECRET
        sync: false
      # Public-safe. Surfaced in browser-side Meta Pixel events.
      # `sync: false` here is not about secrecy but about forcing the operator
      # to enter the value via Render's UI at provisioning. Public-safe means
      # it can leak; that doesn't change that we still need a real value.
      - key: META_PIXEL_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
      # Session + setup auth. SESSION_TOKEN_SECRET is required for the app to mint
      # session tokens — absent, /api/sessions and every authed route fail closed.
      - key: SESSION_TOKEN_SECRET
        sync: false
      - key: INTERNAL_SETUP_SECRET
        sync: false
      # Transactional email (Resend). Absent => onboarding/notification email
      # silently no-ops (RESEND_API_KEY gates send; EMAIL_FROM is the from-address).
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Public chat-service URLs: webhook base + widget-embed snippet host.
      # (Code prefers CHAT_PUBLIC_URL; the SWITCHBOARD_CHAT_URL alias is only a
      # fallback and is intentionally not duplicated here.)
      - key: CHAT_PUBLIC_URL
        sync: false
      - key: CHAT_SERVER_URL
        sync: false
      # Creative-pipeline SSRF allow-list (comma-separated host regexes).
      - key: CREATIVE_PIPELINE_ALLOWED_HOSTS
        sync: false
      # Creative-pipeline durable asset storage (S3-compatible; R2 by default).
      # Absent => rendered creatives are not durable and creative.job.publish
      # fails loud CREATIVE_ASSET_NOT_DURABLE. Bucket must be public-read at
      # CREATIVE_ASSET_PUBLIC_BASE_URL (objects use unguessable keys).
      - key: CREATIVE_ASSET_BUCKET
        sync: false
      - key: CREATIVE_ASSET_S3_ENDPOINT
        sync: false
      - key: CREATIVE_ASSET_REGION
        sync: false
      - key: CREATIVE_ASSET_ACCESS_KEY_ID
        sync: false
      - key: CREATIVE_ASSET_SECRET_ACCESS_KEY
        sync: false
      - key: CREATIVE_ASSET_PUBLIC_BASE_URL
        sync: false
      # Comma-separated allowed CORS origins; MUST include the Vercel dashboard URL
      # or all dashboard->API calls are rejected in prod (origin:false fail-closed).
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN_SERVER
        sync: false
      # Operator paging webhook for terminal infrastructure failures: governance /
      # trace-persist / execution exceptions (PlatformIngress) and retry-exhausted
      # async dead-letters (Inngest onFailure, e.g. a dead-lettered paid creative
      # publish or a retry-exhausted render). UNSET => NoopOperatorAlerter: the alert
      # is logged at error in host logs but NO human is paged. The secret, when set,
      # is sent as a Bearer Authorization header (a Slack incoming-webhook ignores it
      # and authenticates by URL secrecy). api only; the chat service builds no alerter.
      - key: OPERATOR_ALERT_WEBHOOK_URL
        sync: false
      - key: OPERATOR_ALERT_WEBHOOK_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: switchboard-chat
    runtime: docker
    dockerfilePath: ./Dockerfile.chat
    dockerContext: .
    plan: starter
    region: oregon
    numInstances: 1
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /health # Shallow liveness — does NOT depend on api reachability.
    buildFilter:
      paths:
        - apps/chat/**
        - packages/**
        - Dockerfile.chat
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - package.json
        - turbo.json
        - tsconfig.base.json
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: CHAT_PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: switchboard-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: switchboard-redis
          property: connectionString
      - key: CREDENTIALS_ENCRYPTION_KEY
        sync: false
      # Shared chat<->api service secret. MUST be the SAME value on both services.
      # Authenticates the chat-to-API ingress hop (F-15) + provision-notify + chat-approvals.
      # The chat server refuses to boot in managed mode (DATABASE_URL set) without it.
      - key: INTERNAL_API_SECRET
        sync: false
      - key: SWITCHBOARD_API_URL
        value: http://switchboard-api:3000 # Render private network: http://<service-name>:<PORT>. PORT for api is 3000 (set above).
      # Public URL of THIS chat service — used to render the widget-embed <script src>.
      - key: CHAT_SERVER_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENTRY_DSN_SERVER
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: keyvalue
    name: switchboard-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Empty list = private-network only, no public access.

databases:
  - name: switchboard-postgres
    # Render retired the legacy `starter`/`standard`/`pro` Postgres plans for NEW
    # databases (2025). Current flexible-plan slugs: basic-256mb | basic-1gb |
    # basic-4gb | pro-4gb. `free` is auto-deleted after 30 days, never for prod.
    # basic-1gb = 1GB RAM / 10GB storage (~$19/mo): headroom for pgvector + bookings.
    plan: basic-1gb
    region: oregon
    postgresMajorVersion: "16"
